##########################################################
# Aider Config - Test Space Project
# Based on Aider official docs best practices
# https://aider.chat/docs/config/aider_conf.html
##########################################################

# ====================
# Model Config
# ====================

# Main model: use model supporting function calling for best editing experience
# Recommendations:
#   - claude-3-7-sonnet-20250219  (Anthropic, strong editing)
#   - gpt-4o                      (OpenAI, fast)
#   - deepseek/deepseek-chat      (DeepSeek, cost-effective)
#   - o3-mini                     (OpenAI, strong reasoning)
model: deepseek/deepseek-v4-flash

# Weak model: for commit messages and history summary (default same as main)
# Can specify cheaper/faster model to save cost
weak-model: claude-3-5-haiku-20241022

# Editor model: dedicated for code editing tasks (default same as main)
# editor-model: claude-3-7-sonnet-20250219

# Enable architect mode: model plans before editing, good for complex refactoring
architect: false

# Auto accept architect mode changes (default true)
auto-accept-architect: true

# Reasoning effort (for models supporting reasoning)
# reasoning-effort: medium

# Thinking tokens budget (for models supporting thinking)
# thinking-tokens: 16000

# API timeout (seconds)
timeout: 120

# ====================
# Project Convention Files
# ====================

# Auto load project convention files (read-only, not in edit scope)
read:
  - CONVENTIONS.md
  - DEVELOPMENT.md

# ====================
# Git Config
# ====================

# Enable Git integration
git: true

# Auto add .aider* files to .gitignore
gitignore: true

# Auto commit LLM changes (suggest false, manually commit after review)
auto-commits: false

# Auto commit when repo has uncommitted changes (suggest false)
dirty-commits: false

# Mark Aider changes in commit info
attribute-author: true
attribute-committer: true
attribute-co-authored-by: true

# Commit message prefix
attribute-commit-message-author: false
attribute-commit-message-committer: false

# Use --no-verify to skip pre-commit hooks
git-commit-verify: false

# ====================
# Code Quality
# ====================

# Auto lint (run after changes)
auto-lint: true

# Lint commands (by language)
lint-cmd:
  - "typescript: npm run build"
  - "vue: npm run build"
  - "rust: cd src-tauri && cargo check"

# Auto test (run after changes)
auto-test: true

# Test command
# test-cmd: npm test

# ====================
# Output and Interaction
# ====================

# Dark mode (for dark terminal background)
dark-mode: true

# Pretty output
code-theme: monokai

# Stream response
stream: true

# Show diffs (on commit)
show-diffs: true

# Suggest shell commands
suggest-shell-commands: true

# Multiline input mode (Meta-Enter to submit)
multiline: false

# Notifications (when response ready)
notifications: false

# ====================
# Cache and Performance
# ====================

# Enable prompt caching (if model supports)
cache-prompts: true

# Keep cache alive pings (every 5 minutes)
cache-keepalive-pings: 3

# Repo map tokens (0 to disable, default auto)
# map-tokens: 1024

# Repo map refresh strategy: auto / always / files / manual
map-refresh: auto

# ====================
# History
# ====================

# Restore previous chat history
restore-chat-history: true

# Chat history file
chat-history-file: .aider.chat.history.md

# Input history file
input-history-file: .aider.input.history

# ====================
# File Handling
# ====================

# Encoding
encoding: utf-8

# Line endings (platform / crlf / lf)
line-endings: platform

# Aider ignore file
aiderignore: .aiderignore

# Do not include .gitignore files in edit scope
add-gitignore-files: false

# ====================
# Others
# ====================

# Chat language (default follows system)
chat-language: zh

# Commit message language
commit-language: zh

# Enable VI edit mode
vim: false

# Detect and suggest adding URL to chat
detect-urls: true

# Disable Playwright (when web scraping not needed)
disable-playwright: true

# Do not check updates (manual control)
check-update: false

# ====================
# Full Auto Workflow Mode
# ====================
# Usage:
#   python aider_workflow.py "your requirement"
#   .\run_workflow.ps1 "your requirement"
#
# Workflow stages:
#   1. analyze   -> requirement analysis and prompt optimization
#   2. plan      -> implementation planning
#   3. implement -> coding (auto commit)
#   4. review    -> code review
#   5. fix       -> fix review issues (auto commit)
#   6. test      -> regression test
#   7. commit    -> final commit
#
# Quick actions:
#   Skip review:  python aider_workflow.py --skip review,fix "requirement"
#   Dry run:      python aider_workflow.py --dry-run "requirement"
#   From stage:   python aider_workflow.py --from-stage implement "requirement"
